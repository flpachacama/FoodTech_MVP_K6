services:
  k6:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TEST_ENV: ${TEST_ENV:-dev}
      ORDER_BASE_URL: ${ORDER_BASE_URL:-http://host.docker.internal:8081}
      DELIVERY_BASE_URL: ${DELIVERY_BASE_URL:-http://host.docker.internal:8080}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      ENABLE_CLEANUP: ${ENABLE_CLEANUP:-true}
    volumes:
      - ./reports:/performance/reports
    command: ["run", "tests/load.test.js"]

  influxdb:
    image: influxdb:1.8
    profiles: ["observability"]
    ports:
      - "8086:8086"

  grafana:
    image: grafana/grafana:10.4.2
    profiles: ["observability"]
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
