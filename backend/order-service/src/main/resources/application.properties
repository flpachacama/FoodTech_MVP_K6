spring.application.name=order-service
server.port=8081

# ─── PostgreSQL DataSource ───────────────────────────────────────────────────
# DB propia del microservicio (foodtech_orders), misma instancia que delivery.
# En producción/Docker se sobreescriben vía variables de entorno.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foodtech_orders}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:foodtech_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:foodtech_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── SQL Init ────────────────────────────────────────────────────────────────
# data.sql se ejecuta después de que Hibernate crea/actualiza el esquema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ─── Delivery Service ─────────────────────────────────────────────────────────
delivery.service.url=${DELIVERY_SERVICE_URL:http://localhost:8080}
