spring.application.name=foodtech-mvp
server.port=8080

# ─── PostgreSQL DataSource ───────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foodtech_db}
spring.datasource.username=foodtech_user
spring.datasource.password=foodtech_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Para que ejecute el import.sql automáticamente
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true