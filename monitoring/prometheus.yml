global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'k6-performance'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

remote_write:
  - url: http://prometheus:9090/api/v1/write
    queue_config:
      capacity: 10000
      max_shards: 200
      min_shards: 1
      max_samples_per_send: 500
      min_backoff: 30ms
      max_backoff: 100ms
